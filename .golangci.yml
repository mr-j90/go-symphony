version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # Bugs
    - bodyclose        # unclosed HTTP response bodies
    - durationcheck    # bad time.Duration multiplications
    - errcheck         # unchecked errors
    - nilerr           # returning nil after checking err != nil
    - sqlclosecheck    # unclosed sql.Rows

    # Style & Simplification
    - govet            # go vet checks
    - ineffassign      # unused assignments
    - misspell         # spelling mistakes in comments/strings
    - staticcheck      # comprehensive static analysis
    - unconvert        # unnecessary type conversions
    - unparam          # unused function parameters
    - unused           # unused code

    # Security
    - gosec            # security problems

    # Performance
    - prealloc         # preallocate slices where possible

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    govet:
      enable-all: true
      disable:
        - fieldalignment  # not worth the noise

    gosec:
      excludes:
        - G104  # unhandled errors (covered by errcheck)
        - G304  # file inclusion (we intentionally read user-specified paths)

    misspell:
      locale: US

    staticcheck:
      checks: ["all"]

  exclusions:
    rules:
      # Test files can be more relaxed
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam

      # main.go uses os.Exit which is fine
      - path: main\.go
        linters:
          - gosec
        text: "G104"

    presets:
      - comments
      - std-error-handling

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

formatters:
  enable:
    - gofmt
    - goimports
